<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños Renata!</title>
    <style>
        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --background: #f7f9fc;
            --text: #2d3748;
            --cake-color: #ffd166;
            --frosting: #ff1694;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
            position: relative;
        }

        /* Tarjeta Principal */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(255, 117, 140, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
            z-index: 10;
            animation: fadeIn 1.2s ease-out;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        /* Títulos */
        h1 {
            font-size: 2.8rem;
            color: #d90429;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 5px;
            font-family: 'Georgia', serif;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #4a5568;
            margin-bottom: 30px;
        }

        /* Pastel Animado */
        .cake-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px auto;
        }

        .cake {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 60px;
            background: var(--cake-color);
            border-radius: 10px 10px 4px 4px;
            left: 10px;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.05);
        }

        .cake::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background: var(--frosting);
            border-radius: 10px 10px 10px 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .candle {
            position: absolute;
            top: 25px;
            left: 53px;
            width: 14px;
            height: 40px;
            background: linear-gradient(to right, #06d6a0, #118ab2);
            border-radius: 3px 3px 0 0;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 53px;
            width: 14px;
            height: 20px;
            background: #ffb703;
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px #ffb703, 0 0 20px #fb8500;
            animation: flicker 0.6s infinite alternate;
        }

        /* Globos Flotantes */
        .balloon {
            position: absolute;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: -100px;
            opacity: 0.85;
            animation: float Up 8s linear infinite;
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 24px;
            width: 2px;
            height: 15px;
            background: rgba(0,0,0,0.2);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flicker {
            0% { transform: scale(1); }
            100% { transform: scale(1.15) rotate(3deg); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.85; }
            90% { opacity: 0.85; }
            100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Globos Decorativos -->
    <div class="balloon" style="left: 7%; background: #ff477e; animation-delay: 0s; animation-duration: 7s;"></div>
    <div class="balloon" style="left: 25%; background: #ff70a6; animation-delay: 2s; animation-duration: 9s;"></div>
    <div class="balloon" style="left: 70%; background: #ff97b7; animation-delay: 1s; animation-duration: 8s;"></div>
    <div class="balloon" style="left: 85%; background: #ffb5a7; animation-delay: 4s; animation-duration: 6s;"></div>

    <!-- Tarjeta Principal -->
    <div class="card">
        <h1>¡feliz cumple villado!</h1>
        <div class="subtitle">si me tarde,callese</div>
        
        <!-- Pastel -->
        <div class="cake-container">
            <div class="flame"></div>
            <div class="candle"></div>
            <div class="cake"></div>
        </div>

        <p>Me caes mal villano, ni contesta pero me caes muy bien, eres mi mejor amiga y tqm, pa q no diga que no la quiero 🎈✨</p>
    </div>

</body>
</html>
